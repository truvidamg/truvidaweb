        function LangProvider({ children }) {
            const [lang, setLangState] = useState(() => {
                try { return localStorage.getItem('truvida-lang') || 'en'; } catch (e) { return 'en'; }
            });
            useEffect(() => {
                try { localStorage.setItem('truvida-lang', lang); } catch (e) {}
                document.documentElement.lang = lang;
            }, [lang]);
            const setLang = (l) => setLangState(l);
            const value = { lang, setLang, t: TRANSLATIONS[lang] };
            return <LangContext.Provider value={value}>{children}</LangContext.Provider>;
        }
        
        // Custom cursor component
        function CustomCursor({ colors }) {
            const [position, setPosition] = useState({ x: 0, y: 0 });
            const [hoverType, setHoverType] = useState('default');
            const [visible, setVisible] = useState(false);
            
            useEffect(() => {
                const move = (e) => {
                    setPosition({ x: e.clientX, y: e.clientY });
                    
                    const target = e.target;
                    // Hide custom cursor inside forms/modals so native cursor is visible
                    if (target.closest && target.closest('.booking-modal')) {
                        setVisible(false);
                        return;
                    }
                    setVisible(true);
                    
                    if (target.tagName === 'A' || target.tagName === 'BUTTON' || target.closest('a') || target.closest('button')) {
                        setHoverType('link');
                    } else if (target.closest('[data-cursor="view"]')) {
                        setHoverType('view');
                    } else {
                        setHoverType('default');
                    }
                };
                
                const leave = () => setVisible(false);
                
                window.addEventListener('mousemove', move);
                document.addEventListener('mouseleave', leave);
                return () => {
                    window.removeEventListener('mousemove', move);
                    document.removeEventListener('mouseleave', leave);
                };
            }, []);
            
            const size = hoverType === 'link' ? 60 : hoverType === 'view' ? 100 : 16;
            
            return (
                <>
                    <div style={{
                        position: 'fixed',
                        left: position.x,
                        top: position.y,
                        width: size,
                        height: size,
                        borderRadius: '50%',
                        background: hoverType === 'link' ? colors.primary : 'transparent',
                        border: hoverType === 'default' ? `1.5px solid ${colors.primary}` : 'none',
                        transform: 'translate(-50%, -50%)',
                        pointerEvents: 'none',
                        zIndex: 99999,
                        mixBlendMode: hoverType === 'link' ? 'difference' : 'normal',
                        transition: 'width 0.3s ease, height 0.3s ease, background 0.3s ease',
                        opacity: visible ? 1 : 0,
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        color: '#FFF',
                        fontSize: '11px',
                        fontWeight: 600,
                        letterSpacing: '1px',
                        textTransform: 'uppercase'
                    }}>
                        {hoverType === 'view' && 'VIEW'}
                    </div>
                </>
            );
        }
        
        // Animated counter
        function AnimatedCounter({ target, suffix = '', duration = 2000, isVisible }) {
            const [count, setCount] = useState(0);
            
            useEffect(() => {
                if (!isVisible) return;
                
                let start = 0;
                const startTime = Date.now();
                
                const animate = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    setCount(Math.floor(eased * target));
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        setCount(target);
                    }
                };
                
                requestAnimationFrame(animate);
            }, [isVisible, target, duration]);
            
            return <span>{count}{suffix}</span>;
        }
        
        // Use intersection observer
        function useInView(threshold = 0.2) {
            const ref = useRef(null);
            const [inView, setInView] = useState(false);
            
            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) setInView(true);
                    },
                    { threshold }
                );
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, [threshold]);
            
            return [ref, inView];
        }

            const ref = useRef(null);
            const [progress, setProgress] = useState(0);
            const { t } = useLang();
            
            useEffect(() => {
                const update = () => {
                    if (!ref.current) return;
                    const rect = ref.current.getBoundingClientRect();
                    const total = ref.current.offsetHeight - window.innerHeight;
                    const scrolled = -rect.top;
                    setProgress(Math.max(0, Math.min(1, scrolled / total)));
                };
                update();
                window.addEventListener('scroll', update, { passive: true });
                return () => window.removeEventListener('scroll', update);
            }, []);
            
            const statements = t.philosophy.items;
            
            const activeIdx = Math.min(statements.length - 1, Math.floor(progress * statements.length));

            const { t, lang } = useLang();
            const b = t.booking;
            const [step, setStep] = useState(0);
            const [submitted, setSubmitted] = useState(false);
            const [submitting, setSubmitting] = useState(false);
            const [submitError, setSubmitError] = useState(null);
            const [errors, setErrors] = useState({});
            const [form, setForm] = useState({
                name: '', phone: '', email: '', dob: '',
                patientType: 'new',
                formLang: lang === 'es' ? 'es' : 'en',
                reason: '', service: '', date: '', window: '',
                doctor: 'any',
                notes: ''
            });
            const [entered, setEntered] = useState(false);
            useEffect(() => { requestAnimationFrame(() => setEntered(true)); }, []);

            const doctors = [
                { id: 'yahumara', name: 'Yahumara Gonzalez', title: t.doctors.list[0].expertise[0] || 'ARNP, FNP-C', image: 'assets/dr-yahumara.png' },
                { id: 'noel', name: 'Noel Medina', title: t.doctors.list[1].expertise[0] || 'ARNP, FNP-C', image: 'assets/dr-noel.png' }
            ];
            const services = t.services.list.map((s, i) => ({ id: 'service-' + i, label: s.title }));

            const update = (key, value) => {
                setForm(f => ({ ...f, [key]: value }));
                if (errors[key]) setErrors(e => ({ ...e, [key]: null }));
            };

            const validateStep = (s) => {
                const e = {};
                if (s === 0) {
                    if (!form.name.trim() || form.name.trim().length < 2) e.name = b.errors.name;
                    const phoneDigits = form.phone.replace(/\D/g, '');
                    if (phoneDigits.length < 10) e.phone = b.errors.phone;
                    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = b.errors.email;
                }
                if (s === 1) {
                    if (!form.reason) e.reason = b.errors.reason;
                }
                setErrors(e);
                return Object.keys(e).length === 0;
            };

            const submitBooking = async () => {
                if (submitting) return;
                setSubmitting(true);
                setSubmitError(null);
                try {
                    const doctorObj = doctors.find(d => d.id === form.doctor);
                    const serviceObj = services.find(s => s.id === form.service);
                    const payload = {
                        ...form,
                        doctor: doctorObj ? doctorObj.name : (form.doctor === 'any' ? 'No preference' : form.doctor),
                        service: serviceObj ? serviceObj.label : form.service,
                        website: '', // honeypot
                        submittedAt: new Date().toISOString(),
                    };
                    const res = await fetch(BOOKING_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                    if (!res.ok) throw new Error('Request failed');
                    const data = await res.json().catch(() => ({}));
                    if (data && data.ok === false) throw new Error(data.error || 'Request failed');
                    setSubmitted(true);
                } catch (err) {
                    setSubmitError(b.errors && b.errors.submit ? b.errors.submit : 'Could not send your request. Please try again or call us.');
                } finally {
                    setSubmitting(false);
                }
            };

            const handleNext = () => {
                if (validateStep(step)) {
                    if (step < 3) setStep(step + 1);
                    else submitBooking();
                }
            };
            const handleBack = () => {
                if (step > 0) setStep(step - 1);
                else onClose();
            };

            const handleClose = () => {
                setEntered(false);
                setTimeout(onClose, 350);
            };

            // Lock escape to close
            useEffect(() => {
                const onKey = (e) => { if (e.key === 'Escape') handleClose(); };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, []);

            const steps = b.steps;
            const totalSteps = steps.length;

            return (
                <div className="booking-modal" style={{
                    position: 'fixed', inset: 0, zIndex: 100000,
                    background: colors.bg,
                    overflow: 'auto',
                    opacity: entered ? 1 : 0,
                    transition: 'opacity 0.35s ease',
                    fontFamily: "'Plus Jakarta Sans', sans-serif"
                }}>
                    {/* Top bar */}
                    <div style={{
                        position: 'sticky', top: 0, zIndex: 10,
                        background: colors.bg,
                        borderBottom: `1px solid ${colors.text}08`,
                        padding: '24px clamp(24px, 5vw, 80px)',
                        display: 'flex', alignItems: 'center', justifyContent: 'space-between'
                    }}>
                        <div style={{ display: 'flex', alignItems: 'baseline', gap: '20px' }}>
                            <span style={{ display: 'inline-flex', alignItems: 'center', gap: '10px', fontFamily: "'Fraunces', serif", fontSize: '22px', fontWeight: 400, letterSpacing: '-0.5px', color: colors.text }}>
                                <img src="assets/logo-ink.png" alt="" style={{ width: '28px', height: '28px', display: 'block' }} />
                                Truvida<span style={{ color: colors.primary, fontStyle: 'italic' }}>.</span>
                            </span>
                            {!submitted && (
                                <span style={{ fontSize: '12px', letterSpacing: '2px', textTransform: 'uppercase', color: colors.textMuted, fontWeight: 500 }}>
                                    {b.stepOf} {step + 1} {b.of} {totalSteps}
                                </span>
                            )}
                        </div>
                        <button onClick={handleClose} aria-label={b.close} style={{
                            background: 'transparent', border: 'none',
                            fontFamily: 'inherit', cursor: 'none',
                            fontSize: '12px', letterSpacing: '2px', textTransform: 'uppercase',
                            color: colors.text, fontWeight: 500,
                            display: 'flex', alignItems: 'center', gap: '10px', padding: '8px 4px'
                        }}>
                            <span style={{ fontSize: '22px', lineHeight: 1, fontWeight: 300 }}>×</span>
                            {b.close}
                        </button>
                    </div>

                    {/* Progress */}
                    {!submitted && (
                        <div style={{ padding: '0 clamp(24px, 5vw, 80px)', marginTop: '2px' }}>
                            <div style={{ display: 'flex', gap: '6px', maxWidth: '1100px', margin: '0 auto' }}>
                                {steps.map((_, i) => (
                                    <div key={i} style={{
                                        flex: 1, height: '2px',
                                        background: i <= step ? colors.text : colors.text + '15',
                                        transition: 'background 0.5s ease'
                                    }} />
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Body */}
                    <div style={{ padding: 'clamp(40px, 7vw, 96px) clamp(24px, 5vw, 80px) 140px', maxWidth: '1100px', margin: '0 auto' }}>
                        {submitted ? (
                            <ThankYou t={b.thankYou} colors={colors} onDone={handleClose} />
                        ) : (
                            <BookingStep
                                step={step}
                                stepData={steps[step]}
                                b={b}
                                form={form}
                                update={update}
                                errors={errors}
                                colors={colors}
                                doctors={doctors}
                                services={services}
                            />
                        )}
                    </div>

                    {/* Footer nav */}
                    {!submitted && (
                        <div style={{
                            position: 'fixed', bottom: 0, left: 0, right: 0,
                            background: colors.bg,
                            borderTop: `1px solid ${colors.text}08`,
                            padding: '20px clamp(24px, 5vw, 80px)',
                            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                            zIndex: 10
                        }}>
                            <button onClick={handleBack} style={{
                                background: 'transparent', border: 'none',
                                fontFamily: 'inherit', cursor: 'none',
                                fontSize: '13px', letterSpacing: '1px', textTransform: 'uppercase',
                                color: colors.textLight, fontWeight: 500,
                                padding: '16px 0', display: 'flex', alignItems: 'center', gap: '10px'
                            }}>
                                <span style={{ fontSize: '18px' }}>←</span> {b.back}
                            </button>
                            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: '8px' }}>
                                {submitError && (
                                    <div style={{ color: '#C44', fontSize: '12px', letterSpacing: '0.3px' }}>{submitError}</div>
                                )}
                                <button onClick={handleNext} disabled={submitting} style={{
                                    background: colors.text, color: colors.bg,
                                    border: 'none', fontFamily: 'inherit', cursor: submitting ? 'wait' : 'none',
                                    fontSize: '14px', letterSpacing: '0.5px',
                                    fontWeight: 500, padding: '20px 44px',
                                    borderRadius: '100px',
                                    opacity: submitting ? 0.6 : 1,
                                    display: 'flex', alignItems: 'center', gap: '12px'
                                }}>
                                    {submitting ? (b.sending || 'Sending…') : (step === totalSteps - 1 ? b.submit : b.next)}
                                    <span style={{ fontSize: '16px' }}>→</span>
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function BookingStep({ step, stepData, b, form, update, errors, colors, doctors, services }) {
            return (
                <div key={step} style={{
                    animation: 'bookingFade 0.5s ease both'
                }}>
                    <p style={{
                        fontSize: '12px', letterSpacing: '3px', textTransform: 'uppercase',
                        color: colors.primary, fontWeight: 600, marginBottom: '28px'
                    }}>{stepData.eyebrow}</p>
                    <h2 style={{
                        fontFamily: "'Fraunces', serif",
                        fontSize: 'clamp(40px, 6vw, 72px)',
                        fontWeight: 300, lineHeight: 1.05, letterSpacing: '-2px',
                        color: colors.text, marginBottom: stepData.subtitle ? '20px' : '56px',
                        maxWidth: '900px'
                    }}>
                        {stepData.title.split(' ').slice(0, -1).join(' ')}{' '}
                        <span style={{ fontStyle: 'italic', color: colors.primary }}>
                            {stepData.title.split(' ').slice(-1)[0]}
                        </span>
                    </h2>
                    {stepData.subtitle && (
                        <p style={{
                            fontSize: '18px', lineHeight: 1.6, color: colors.textLight,
                            maxWidth: '640px', marginBottom: '56px', fontWeight: 300
                        }}>{stepData.subtitle}</p>
                    )}

                    {step === 0 && <StepAbout f={stepData.fields} form={form} update={update} errors={errors} colors={colors} b={b} />}
                    {step === 1 && <StepVisit f={stepData.fields} form={form} update={update} errors={errors} colors={colors} b={b} services={services} />}
                    {step === 2 && <StepProvider stepData={stepData} form={form} update={update} colors={colors} doctors={doctors} />}
                    {step === 3 && <StepReview stepData={stepData} form={form} colors={colors} b={b} doctors={doctors} services={services} />}
                </div>
            );
        }

        // Shared field styles
        const bookInputStyle = (colors, err) => ({
            width: '100%',
            background: 'transparent',
            border: 'none',
            borderBottom: `1px solid ${err ? '#C44' : colors.text + '25'}`,
            padding: '14px 0',
            fontSize: '18px',
            fontFamily: 'inherit',
            color: colors.text,
            outline: 'none',
            transition: 'border-color 0.3s ease'
        });
        const bookLabelStyle = (colors) => ({
            display: 'block',
            fontSize: '11px',
            letterSpacing: '2px',
            textTransform: 'uppercase',
            color: colors.textMuted,
            fontWeight: 600,
            marginBottom: '8px'
        });
        const bookErrorStyle = { color: '#C44', fontSize: '12px', marginTop: '6px', letterSpacing: '0.3px' };

        function BookField({ label, error, required, children, colors }) {
            return (
                <div style={{ marginBottom: '36px' }}>
                    <label style={bookLabelStyle(colors)}>
                        {label} {required && <span style={{ color: colors.primary, marginLeft: '4px' }}>*</span>}
                    </label>
                    {children}
                    {error && <div style={bookErrorStyle}>{error}</div>}
                </div>
            );
        }

        function StepAbout({ f, form, update, errors, colors, b }) {
            return (
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', columnGap: '48px' }}>
                    <div>
                        <BookField label={f.name} required error={errors.name} colors={colors}>
                            <input type="text" value={form.name} onChange={e => update('name', e.target.value)}
                                placeholder="Jane Doe" style={bookInputStyle(colors, errors.name)} />
                        </BookField>
                        <BookField label={f.phone} required error={errors.phone} colors={colors}>
                            <input type="tel" value={form.phone} onChange={e => update('phone', e.target.value)}
                                placeholder="(786) 555 0199" style={bookInputStyle(colors, errors.phone)} />
                        </BookField>
                        <BookField label={f.email} required error={errors.email} colors={colors}>
                            <input type="email" value={form.email} onChange={e => update('email', e.target.value)}
                                placeholder="you@example.com" style={bookInputStyle(colors, errors.email)} />
                        </BookField>
                    </div>
                    <div>
                        <BookField label={f.dob} colors={colors}>
                            <input type="date" value={form.dob} onChange={e => update('dob', e.target.value)}
                                style={bookInputStyle(colors)} />
                        </BookField>
                        <BookField label={f.patientType} required colors={colors}>
                            <PillGroup value={form.patientType} onChange={v => update('patientType', v)} colors={colors}
                                options={[{ v: 'new', label: f.patientNew }, { v: 'existing', label: f.patientExisting }]} />
                        </BookField>
                        <BookField label={f.language} colors={colors}>
                            <PillGroup value={form.formLang} onChange={v => update('formLang', v)} colors={colors}
                                options={[{ v: 'en', label: f.langEn }, { v: 'es', label: f.langEs }]} />
                        </BookField>
                    </div>
                </div>
            );
        }

        function StepVisit({ f, form, update, errors, colors, b, services }) {
            const reasons = [
                { v: 'new', label: f.reasonNew },
                { v: 'follow', label: f.reasonFollow },
                { v: 'wellness', label: f.reasonWellness },
                { v: 'other', label: f.reasonOther }
            ];
            const windows = [
                { v: 'morning', label: f.morning },
                { v: 'afternoon', label: f.afternoon },
                { v: 'evening', label: f.evening },
                { v: 'flexible', label: f.flexible }
            ];
            return (
                <div>
                    <BookField label={f.reason} required error={errors.reason} colors={colors}>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '10px', marginTop: '4px' }}>
                            {reasons.map(r => (
                                <button key={r.v} type="button" onClick={() => update('reason', r.v)} style={{
                                    padding: '20px 24px',
                                    background: form.reason === r.v ? colors.text : 'transparent',
                                    color: form.reason === r.v ? colors.bg : colors.text,
                                    border: `1px solid ${form.reason === r.v ? colors.text : colors.text + '20'}`,
                                    fontFamily: 'inherit', cursor: 'none',
                                    fontSize: '15px', fontWeight: 400,
                                    textAlign: 'left', borderRadius: '2px',
                                    transition: 'all 0.3s ease'
                                }}>{r.label}</button>
                            ))}
                        </div>
                    </BookField>
                    {form.reason === 'wellness' && (
                        <BookField label={f.service} colors={colors}>
                            <select value={form.service} onChange={e => update('service', e.target.value)}
                                style={{ ...bookInputStyle(colors), cursor: 'none', appearance: 'none', backgroundImage: `linear-gradient(45deg, transparent 50%, ${colors.text} 50%), linear-gradient(135deg, ${colors.text} 50%, transparent 50%)`, backgroundPosition: `calc(100% - 16px) center, calc(100% - 10px) center`, backgroundSize: '6px 6px', backgroundRepeat: 'no-repeat' }}>
                                <option value="">{f.servicePlaceholder}</option>
                                {services.map(s => <option key={s.id} value={s.label}>{s.label}</option>)}
                            </select>
                        </BookField>
                    )}
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: '48px', marginTop: '16px' }}>
                        <BookField label={f.date} colors={colors}>
                            <input type="date" value={form.date} onChange={e => update('date', e.target.value)}
                                style={bookInputStyle(colors)} />
                        </BookField>
                        <BookField label={f.window} colors={colors}>
                            <PillGroup value={form.window} onChange={v => update('window', v)} colors={colors} options={windows} />
                        </BookField>
                    </div>
                </div>
            );
        }

        function StepProvider({ stepData, form, update, colors, doctors }) {
            return (
                <div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(260px, 1fr))', gap: '20px', marginBottom: '32px' }}>
                        {doctors.map(doc => {
                            const sel = form.doctor === doc.id;
                            return (
                                <button key={doc.id} type="button" onClick={() => update('doctor', doc.id)} style={{
                                    background: sel ? colors.text : colors.surface,
                                    color: sel ? colors.bg : colors.text,
                                    border: `1px solid ${sel ? colors.text : colors.text + '15'}`,
                                    padding: '0', textAlign: 'left',
                                    fontFamily: 'inherit', cursor: 'none',
                                    borderRadius: '4px', overflow: 'hidden',
                                    transition: 'all 0.4s ease',
                                    display: 'flex', flexDirection: 'column'
                                }}>
                                    <div style={{
                                        width: '100%', aspectRatio: '4 / 5',
                                        background: `url(${doc.image}) center/cover, ${colors.text}10`,
                                        filter: sel ? 'none' : 'grayscale(30%)',
                                        transition: 'filter 0.4s ease'
                                    }} />
                                    <div style={{ padding: '24px' }}>
                                        <div style={{ fontFamily: "'Fraunces', serif", fontSize: '24px', fontWeight: 400, letterSpacing: '-0.5px', marginBottom: '6px' }}>
                                            {doc.name}
                                        </div>
                                        <div style={{ fontSize: '12px', letterSpacing: '1.5px', textTransform: 'uppercase', opacity: 0.6, fontWeight: 500 }}>
                                            {doc.title}
                                        </div>
                                    </div>
                                </button>
                            );
                        })}
                        {/* Any provider */}
                        <button type="button" onClick={() => update('doctor', 'any')} style={{
                            background: form.doctor === 'any' ? colors.text : colors.surface,
                            color: form.doctor === 'any' ? colors.bg : colors.text,
                            border: `1px solid ${form.doctor === 'any' ? colors.text : colors.text + '15'}`,
                            padding: '32px 28px', textAlign: 'left',
                            fontFamily: 'inherit', cursor: 'none',
                            borderRadius: '4px',
                            transition: 'all 0.4s ease',
                            display: 'flex', flexDirection: 'column', justifyContent: 'center',
                            minHeight: '260px'
                        }}>
                            <div style={{ fontSize: '36px', marginBottom: '20px', fontWeight: 200, fontFamily: "'Fraunces', serif", fontStyle: 'italic', opacity: 0.7 }}>
                                ~
                            </div>
                            <div style={{ fontFamily: "'Fraunces', serif", fontSize: '22px', fontWeight: 400, letterSpacing: '-0.3px', marginBottom: '12px', lineHeight: 1.2 }}>
                                {stepData.anyProvider}
                            </div>
                            <div style={{ fontSize: '13px', lineHeight: 1.6, opacity: 0.7, fontWeight: 300 }}>
                                {stepData.anyProviderDesc}
                            </div>
                        </button>
                    </div>
                    <BookField label={stepData.notes} colors={colors}>
                        <textarea value={form.notes} onChange={e => update('notes', e.target.value)}
                            placeholder={stepData.notesPlaceholder} rows={4}
                            style={{ ...bookInputStyle(colors), resize: 'vertical', lineHeight: 1.6, padding: '14px 0' }} />
                    </BookField>
                </div>
            );
        }

        function StepReview({ stepData, form, colors, b, doctors, services }) {
            const f0 = b.steps[0].fields;
            const f1 = b.steps[1].fields;
            const reasonLabels = { new: f1.reasonNew, follow: f1.reasonFollow, wellness: f1.reasonWellness, other: f1.reasonOther };
            const windowLabels = { morning: f1.morning, afternoon: f1.afternoon, evening: f1.evening, flexible: f1.flexible };
            const docName = form.doctor === 'any'
                ? stepData.summary.anyProvider
                : (doctors.find(d => d.id === form.doctor)?.name || stepData.summary.anyProvider);

            const Row = ({ label, value }) => (
                <div style={{ display: 'grid', gridTemplateColumns: '160px 1fr', gap: '24px', padding: '18px 0', borderBottom: `1px solid ${colors.text}10` }}>
                    <div style={{ fontSize: '11px', letterSpacing: '2px', textTransform: 'uppercase', color: colors.textMuted, fontWeight: 600, paddingTop: '3px' }}>{label}</div>
                    <div style={{ fontSize: '16px', color: colors.text, lineHeight: 1.5 }}>{value || <span style={{ color: colors.textMuted, fontStyle: 'italic' }}>{stepData.summary.none}</span>}</div>
                </div>
            );

            return (
                <div>
                    <div style={{ marginBottom: '48px' }}>
                        <Row label={stepData.summary.contact} value={
                            <span>
                                <strong style={{ fontWeight: 500 }}>{form.name}</strong><br />
                                {form.phone} · {form.email}
                                {form.dob && <><br />{f0.dob}: {form.dob}</>}
                            </span>
                        } />
                        <Row label={stepData.summary.visit} value={
                            <span>
                                {reasonLabels[form.reason] || ''}
                                {form.service && <><br />{form.service}</>}
                                {(form.date || form.window) && <><br />{form.date}{form.date && form.window ? ' · ' : ''}{windowLabels[form.window] || ''}</>}
                            </span>
                        } />
                        <Row label={stepData.summary.provider} value={docName} />
                        {form.notes && <Row label={stepData.summary.notes} value={form.notes} />}
                    </div>
                    <p style={{ fontSize: '13px', lineHeight: 1.6, color: colors.textMuted, maxWidth: '640px', fontWeight: 300 }}>
                        {stepData.consent}
                    </p>
                </div>
            );
        }

        function PillGroup({ value, onChange, options, colors }) {
            return (
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', marginTop: '4px' }}>
                    {options.map(o => {
                        const sel = value === o.v;
                        return (
                            <button key={o.v} type="button" onClick={() => onChange(o.v)} style={{
                                padding: '12px 22px',
                                background: sel ? colors.text : 'transparent',
                                color: sel ? colors.bg : colors.text,
                                border: `1px solid ${sel ? colors.text : colors.text + '20'}`,
                                fontFamily: 'inherit', cursor: 'none',
                                fontSize: '14px', fontWeight: 400,
                                borderRadius: '100px',
                                transition: 'all 0.25s ease'
                            }}>{o.label}</button>
                        );
                    })}
                </div>
            );
        }

        function ThankYou({ t, colors, onDone }) {
            return (
                <div style={{ animation: 'bookingFade 0.6s ease both', maxWidth: '820px' }}>
                    <p style={{ fontSize: '12px', letterSpacing: '3px', textTransform: 'uppercase', color: colors.primary, fontWeight: 600, marginBottom: '28px' }}>
                        {t.eyebrow}
                    </p>
                    <h2 style={{
                        fontFamily: "'Fraunces', serif",
                        fontSize: 'clamp(48px, 7vw, 96px)',
                        fontWeight: 300, lineHeight: 1.0, letterSpacing: '-3px',
                        color: colors.text, marginBottom: '36px'
                    }}>
                        {t.title1}<br />
                        <span style={{ fontStyle: 'italic', color: colors.primary }}>{t.title2}</span>
                    </h2>
                    <p style={{ fontSize: '20px', lineHeight: 1.6, color: colors.textLight, marginBottom: '80px', fontWeight: 300, maxWidth: '620px' }}>
                        {t.message}
                    </p>
                    <p style={{ fontSize: '11px', letterSpacing: '2.5px', textTransform: 'uppercase', color: colors.textMuted, fontWeight: 600, marginBottom: '32px' }}>
                        {t.nextSteps}
                    </p>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: '24px', marginBottom: '80px' }}>
                        {t.steps.map((s, i) => (
                            <div key={i} style={{ paddingTop: '24px', borderTop: `1px solid ${colors.text}15` }}>
                                <div style={{ fontFamily: "'Fraunces', serif", fontSize: '14px', fontStyle: 'italic', color: colors.primary, marginBottom: '16px', fontWeight: 400 }}>
                                    {s.num}
                                </div>
                                <div style={{ fontFamily: "'Fraunces', serif", fontSize: '22px', fontWeight: 400, letterSpacing: '-0.5px', marginBottom: '10px', color: colors.text }}>
                                    {s.title}
                                </div>
                                <div style={{ fontSize: '14px', lineHeight: 1.6, color: colors.textLight, fontWeight: 300 }}>
                                    {s.desc}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap' }}>
                        <button onClick={onDone} style={{
                            background: colors.text, color: colors.bg,
                            border: 'none', fontFamily: 'inherit', cursor: 'none',
                            fontSize: '14px', letterSpacing: '0.5px', fontWeight: 500,
                            padding: '20px 44px', borderRadius: '100px',
                            display: 'flex', alignItems: 'center', gap: '12px'
                        }}>
                            {t.done} <span style={{ fontSize: '16px' }}>→</span>
                        </button>
                        <a href="tel:7868830339" style={{
                            background: 'transparent', color: colors.text,
                            border: `1px solid ${colors.text}25`,
                            textDecoration: 'none',
                            fontSize: '14px', letterSpacing: '0.5px', fontWeight: 500,
                            padding: '20px 36px', borderRadius: '100px',
                            display: 'inline-flex', alignItems: 'center', gap: '12px'
                        }}>
                            {t.callUs} · (786) 883-0339
                        </a>
                    </div>
                </div>
            );
        }

        function TweaksPanel({ tweaks, updateTweak, colors }) {
            return (
                <div style={{
                    position: 'fixed',
                    bottom: '20px',
                    right: '20px',
                    background: '#FFF',
                    padding: '28px',
                    borderRadius: '16px',
                    border: `1px solid ${colors.primary}30`,
                    boxShadow: '0 8px 32px rgba(0,0,0,0.12)',
                    width: '320px',
                    zIndex: 10000
                }}>
                    <h3 style={{ fontSize: '18px', fontWeight: 600, marginBottom: '24px', color: colors.text }}>
                        Customize Colors
                    </h3>
                    {[
                        { key: 'primaryColor', label: 'Primary' },
                        { key: 'secondaryColor', label: 'Secondary' },
                        { key: 'accentColor', label: 'Accent' }
                    ].map(({ key, label }) => (
                        <div key={key} style={{ marginBottom: '16px' }}>
                            <label style={{
                                fontSize: '11px',
                                color: colors.textMuted,
                                display: 'block',
                                marginBottom: '8px',
                                textTransform: 'uppercase',
                                letterSpacing: '1px',
                                fontWeight: 600
                            }}>{label}</label>
                            <input
                                type="color"
                                value={tweaks[key]}
                                onChange={(e) => updateTweak(key, e.target.value)}
                                style={{
                                    width: '100%',
                                    height: '44px',
                                    border: `1px solid ${colors.text}20`,
                                    borderRadius: '8px',
                                    cursor: 'pointer'
                                }}
                            />
                        </div>
                    ))}
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LangProvider><TruvidaWebsite /></LangProvider>);
    </script>
</body>
</html>

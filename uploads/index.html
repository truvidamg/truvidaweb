    <style>

<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
          "primaryColor": "#3057ab",
          "secondaryColor": "#ededed",
          "accentColor": "#2126b0"
        }/*EDITMODE-END*/;
        
        // Custom cursor component
        function CustomCursor({ colors }) {
            const [position, setPosition] = useState({ x: 0, y: 0 });
            const [hoverType, setHoverType] = useState('default');
            const [visible, setVisible] = useState(false);
            
            useEffect(() => {
                const move = (e) => {
                    setPosition({ x: e.clientX, y: e.clientY });
                    setVisible(true);
                    
                    const target = e.target;
                    if (target.tagName === 'A' || target.tagName === 'BUTTON' || target.closest('a') || target.closest('button')) {
                        setHoverType('link');
                    } else if (target.closest('[data-cursor="view"]')) {
                        setHoverType('view');
                    } else {
                        setHoverType('default');
                    }
                };
                
                const leave = () => setVisible(false);
                
                window.addEventListener('mousemove', move);
                document.addEventListener('mouseleave', leave);
                return () => {
                    window.removeEventListener('mousemove', move);
                    document.removeEventListener('mouseleave', leave);
                };
            }, []);
            
            const size = hoverType === 'link' ? 60 : hoverType === 'view' ? 100 : 16;
            
            return (
                <>
                    <div style={{
                        position: 'fixed',
                        left: position.x,
                        top: position.y,
                        width: size,
                        height: size,
                        borderRadius: '50%',
                        background: hoverType === 'link' ? colors.primary : 'transparent',
                        border: hoverType === 'default' ? `1.5px solid ${colors.primary}` : 'none',
                        transform: 'translate(-50%, -50%)',
                        pointerEvents: 'none',
                        zIndex: 99999,
                        mixBlendMode: hoverType === 'link' ? 'difference' : 'normal',
                        transition: 'width 0.3s ease, height 0.3s ease, background 0.3s ease',
                        opacity: visible ? 1 : 0,
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        color: '#FFF',
                        fontSize: '11px',
                        fontWeight: 600,
                        letterSpacing: '1px',
                        textTransform: 'uppercase'
                    }}>
                        {hoverType === 'view' && 'VIEW'}
                    </div>
                </>
            );
        }
        
        // Animated counter
        function AnimatedCounter({ target, suffix = '', duration = 2000, isVisible }) {
            const [count, setCount] = useState(0);
            
            useEffect(() => {
                if (!isVisible) return;
                
                let start = 0;
                const startTime = Date.now();
                
                const animate = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    setCount(Math.floor(eased * target));
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        setCount(target);
                    }
                };
                
                requestAnimationFrame(animate);
            }, [isVisible, target, duration]);
            
            return <span>{count}{suffix}</span>;
        }
        
        // Use intersection observer
        function useInView(threshold = 0.2) {
            const ref = useRef(null);
            const [inView, setInView] = useState(false);
            
            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) setInView(true);
                    },
                    { threshold }
                );
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, [threshold]);
            
            return [ref, inView];
        }
        
        function TruvidaWebsite() {
            const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
            const [editMode, setEditMode] = useState(false);
            const [scrollY, setScrollY] = useState(0);
            const [loaded, setLoaded] = useState(false);
            
            const colors = {
                primary: tweaks.primaryColor,
                secondary: tweaks.secondaryColor,
                accent: tweaks.accentColor,
                bg: '#FAFAF9',
                dark: '#0A0A0C',
                surface: '#FFFFFF',
                text: '#0A0A0C',
                textLight: '#4A4A52',
                textMuted: '#9B9BA3'
            };
            
            useEffect(() => {
                setTimeout(() => setLoaded(true), 100);
                
                const handleScroll = () => setScrollY(window.scrollY);
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            
            useEffect(() => {
                const handleMessage = (e) => {
                    if (e.data?.type === '__activate_edit_mode') setEditMode(true);
                    else if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
                };
                window.addEventListener('message', handleMessage);
                window.parent.postMessage({ type: '__edit_mode_available' }, '*');
                return () => window.removeEventListener('message', handleMessage);
            }, []);
            
            const updateTweak = (key, value) => {
                const newTweaks = { ...tweaks, [key]: value };
                setTweaks(newTweaks);
                window.parent.postMessage({
                    type: '__edit_mode_set_keys',
                    edits: { [key]: value }
                }, '*');
            };
            
            return (
                <div style={{ background: colors.bg, color: colors.text }}>
                    <CustomCursor colors={colors} />
                    <ScrollProgress colors={colors} scrollY={scrollY} />
                    <Navigation colors={colors} scrollY={scrollY} />
                    <HeroSection colors={colors} scrollY={scrollY} loaded={loaded} />
                    <MarqueeSection colors={colors} />
                    <StatsSection colors={colors} scrollY={scrollY} />
                    <StickyPhilosophy colors={colors} scrollY={scrollY} />
                    <DoctorsShowcase colors={colors} scrollY={scrollY} />
                    <ServicesShowcase colors={colors} scrollY={scrollY} />
                    <InsuranceSection colors={colors} />
                    <TestimonialsSection colors={colors} scrollY={scrollY} />
                    <LocationSection colors={colors} scrollY={scrollY} />
                    <CTASection colors={colors} scrollY={scrollY} />
                    <Footer colors={colors} />
                    
                    {editMode && <TweaksPanel tweaks={tweaks} updateTweak={updateTweak} colors={colors} />}
                </div>
            );
        }
        
        function ScrollProgress({ colors, scrollY }) {
            const progress = Math.min(100, (scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100);
            return (
                <div style={{
                    position: 'fixed',
                    top: 0,
                    left: 0,
                    height: '2px',
                    width: `${progress}%`,
                    background: `linear-gradient(90deg, ${colors.primary}, ${colors.accent})`,
                    zIndex: 99998,
                    transition: 'width 0.1s linear'
                }} />
            );
        }
        
        function Navigation({ colors, scrollY }) {

            return (

                }}>
                    <div style={{
                        maxWidth: '1600px',
                        margin: '0 auto',
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center'
                    }}>
                        <div style={{
                            fontSize: '24px',
                            fontFamily: "'Fraunces', serif",
                            fontWeight: 400,
                            fontStyle: 'italic',
                            color: colors.text,
                            letterSpacing: '0px'
                        }}>
                            Truvida<span style={{ color: colors.primary }}>.</span>
                        </div>
                        <div style={{ display: 'flex', gap: '40px', alignItems: 'center' }}>
                            {[
                                { label: 'Philosophy', href: '#philosophy' },
                                { label: 'Physicians', href: '#doctors' },
                                { label: 'Services', href: '#services' },
                                { label: 'Location', href: '#location' }
                            ].map(item => (
                                <a key={item.label} href={item.href} style={{
                                    color: colors.text,
                                    textDecoration: 'none',
                                    fontSize: '14px',
                                    fontWeight: 500,
                                    position: 'relative',
                                    transition: 'color 0.3s ease'
                                }}>{item.label}</a>
                            ))}
                            <a href="tel:7868830339" style={{
                                padding: '14px 32px',
                                background: colors.text,
                                color: colors.bg,
                                textDecoration: 'none',
                                fontSize: '13px',
                                fontWeight: 500,
                                letterSpacing: '0.5px',
                                borderRadius: '100px',
                                transition: 'all 0.4s ease'
                            }}>Book Now</a>
                        </div>
                    </div>
                </nav>
            );
        }
        
        function HeroSection({ colors, scrollY, loaded }) {
            const parallax = scrollY * 0.4;
            const opacity = Math.max(0, 1 - scrollY / 700);
            const scale = 1 + scrollY * 0.0003;
            
            return (

                    overflow: 'hidden',

                    background: colors.bg

                    {/* Animated background */}
                    <div style={{
                        position: 'absolute',
                        inset: 0,
                        transform: `scale(${scale})`,

                    }}>
                        <div style={{
                            position: 'absolute',
                            top: '15%',
                            right: '8%',
                            width: '500px',
                            height: '500px',
                            borderRadius: '50%',
                            background: `radial-gradient(circle, ${colors.primary}35, transparent 70%)`,
                            filter: 'blur(40px)',
                            animation: 'float 8s ease-in-out infinite'
                        }} />
                        <div style={{
                            position: 'absolute',
                            bottom: '10%',
                            left: '5%',

                            height: '600px',

                        <div style={{
                            position: 'absolute',
                            top: '40%',
                            left: '40%',

                            height: '300px',
                            borderRadius: '50%',
                            background: `radial-gradient(circle, ${colors.primary}20, transparent 70%)`,
                            filter: 'blur(30px)',
                            animation: 'pulse 6s ease-in-out infinite'

                    </div>
                    
                    {/* Grid lines */}
                    <div style={{
                        position: 'absolute',
                        inset: 0,
                        backgroundImage: `linear-gradient(${colors.text}08 1px, transparent 1px), linear-gradient(90deg, ${colors.text}08 1px, transparent 1px)`,
                        backgroundSize: '80px 80px',
                        maskImage: 'radial-gradient(ellipse at center, black 30%, transparent 70%)',
                        WebkitMaskImage: 'radial-gradient(ellipse at center, black 30%, transparent 70%)'
                    }} />
                    
                    <div style={{
                        position: 'relative',
                        zIndex: 2,
                        textAlign: 'center',
                        maxWidth: '1400px',
                        padding: '120px 48px 60px',
                        transform: `translateY(${parallax * 0.5}px)`,

                        {/* Badge */}
                        <div className={`text-reveal ${loaded ? 'loaded' : ''}`} style={{ marginBottom: '48px' }}>
                            <div className="text-reveal-line">

                                    fontWeight: 500,
                                    color: colors.text,
                                    letterSpacing: '0.5px'
                                }}>
                                    <span style={{
                                        width: '8px',
                                        height: '8px',

                                        boxShadow: '0 0 12px #22C55E'
                                    }} />
                                    Accepting new patients
                                </div>
                            </div>
                        </div>
                        
                        {/* Hero title */}
                        <div className={`text-reveal ${loaded ? 'loaded' : ''}`}>
                            <h1 style={{
                                fontFamily: "'Fraunces', serif",
                                fontSize: 'clamp(64px, 11vw, 180px)',
                                fontWeight: 300,
                                lineHeight: 0.95,
                                letterSpacing: '-4px',
                                color: colors.text
                            }}>
                                <span className="text-reveal-line">
                                    <span className="text-reveal-inner" style={{ transitionDelay: '0.1s' }}>Primary care,</span>
                                </span>
                                <span className="text-reveal-line">
                                    <span className="text-reveal-inner" style={{ 
                                        transitionDelay: '0.3s',
                                        fontStyle: 'italic',
                                        color: colors.primary,
                                        fontWeight: 400
                                    }}>reimagined.</span>
                                </span>
                            </h1>
                        </div>
                        
                        <div className={`text-reveal ${loaded ? 'loaded' : ''}`} style={{ marginTop: '48px' }}>
                            <div className="text-reveal-line">
                                <p className="text-reveal-inner" style={{
                                    transitionDelay: '0.6s',
                                    fontSize: '22px',
                                    lineHeight: 1.5,
                                    color: colors.textLight,
                                    maxWidth: '680px',
                                    margin: '0 auto',
                                    fontWeight: 300
                                }}>
                                    Comprehensive healthcare in Miami, delivered with
                                    dedication by board-certified practitioners.
                                </p>
                            </div>
                        </div>
                        
                        <div className={`text-reveal ${loaded ? 'loaded' : ''}`} style={{ marginTop: '64px' }}>
                            <div className="text-reveal-line">
                                <div className="text-reveal-inner" style={{ transitionDelay: '0.9s', display: 'flex', gap: '16px', justifyContent: 'center', flexWrap: 'wrap' }}>
                                    <a href="#doctors" style={{
                                        padding: '20px 48px',
                                        background: colors.text,
                                        color: colors.bg,
                                        textDecoration: 'none',
                                        fontSize: '15px',
                                        fontWeight: 500,
                                        letterSpacing: '0.5px',
                                        borderRadius: '100px',
                                        transition: 'all 0.4s ease',
                                        display: 'inline-flex',
                                        alignItems: 'center',
                                        gap: '12px'
                                    }}>
                                        Meet our physicians
                                        <span style={{ fontSize: '18px' }}>↓</span>
                                    </a>
                                    <a href="tel:7868830339" style={{
                                        padding: '20px 48px',
                                        background: 'transparent',
                                        color: colors.text,
                                        textDecoration: 'none',
                                        fontSize: '15px',
                                        fontWeight: 500,
                                        letterSpacing: '0.5px',
                                        borderRadius: '100px',
                                        border: `1.5px solid ${colors.text}30`,
                                        transition: 'all 0.4s ease'
                                    }}>
                                        (786) 883-0339
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    {/* Scroll indicator */}
                    <div style={{
                        position: 'absolute',
                        bottom: '32px',
                        left: '50%',
                        transform: 'translateX(-50%)',
                        opacity: opacity,
                        display: 'flex',
                        flexDirection: 'column',
                        alignItems: 'center',
                        gap: '12px'
                    }}>
                        <span style={{
                            fontSize: '11px',
                            letterSpacing: '2px',
                            textTransform: 'uppercase',
                            color: colors.textMuted,
                            fontWeight: 500
                        }}>Scroll</span>
                        <div style={{
                            width: '1px',
                            height: '60px',
                            background: `linear-gradient(to bottom, ${colors.text}, transparent)`,
                            animation: 'pulse 2s ease-in-out infinite'
                        }} />
                    </div>
                </section>
            );
        }
        
        function MarqueeSection({ colors }) {
            const words = ['Compassionate Care', 'Expert Physicians', 'Primary Care', 'Wellness', 'Diagnostics', 'Prevention', 'Comprehensive Care', 'Patient-First'];
            return (
                <section style={{
                    padding: '60px 0',
                    background: colors.dark,
                    overflow: 'hidden',
                    borderTop: `1px solid ${colors.text}20`,
                    borderBottom: `1px solid ${colors.text}20`
                }}>
                    <div style={{
                        display: 'flex',
                        animation: 'scroll 40s linear infinite',
                        width: 'max-content',
                        gap: '80px'
                    }}>
                        {[...words, ...words, ...words].map((word, idx) => (
                            <div key={idx} style={{
                                display: 'flex',
                                alignItems: 'center',
                                gap: '80px',
                                fontFamily: "'Fraunces', serif",
                                fontSize: '56px',
                                fontWeight: 300,
                                color: '#FFF',
                                whiteSpace: 'nowrap',
                                fontStyle: idx % 2 === 0 ? 'italic' : 'normal'
                            }}>
                                {word}
                                <span style={{ color: colors.primary, fontSize: '32px' }}>✦</span>
                            </div>
                        ))}
                    </div>
                </section>
            );
        }
        
        function StatsSection({ colors, scrollY }) {
            const [ref, inView] = useInView(0.3);
            
            const stats = [
                { num: 16, suffix: '+', label: 'Years of combined experience' },
                { num: 7, suffix: '', label: 'Comprehensive service areas' },
                { num: 8, suffix: '+', label: 'Insurance providers accepted' },
                { num: 100, suffix: '%', label: 'Patient-first approach' }
            ];
            
            return (
                <section ref={ref} style={{
                    padding: '160px 48px',
                    background: colors.bg
                }}>
                    <div style={{
                        maxWidth: '1400px',
                        margin: '0 auto',
                        display: 'grid',
                        gridTemplateColumns: 'repeat(4, 1fr)',
                        gap: '48px'
                    }}>
                        {stats.map((stat, idx) => (
                            <div key={idx} style={{
                                borderLeft: `1px solid ${colors.text}15`,
                                paddingLeft: '32px',
                                transform: inView ? 'translateY(0)' : 'translateY(40px)',
                                opacity: inView ? 1 : 0,
                                transition: `all 0.8s cubic-bezier(0.4, 0, 0.2, 1) ${idx * 0.1}s`
                            }}>
                                <div style={{
                                    fontFamily: "'Fraunces', serif",
                                    fontSize: 'clamp(56px, 7vw, 96px)',
                                    fontWeight: 300,
                                    lineHeight: 1,
                                    color: colors.text,
                                    marginBottom: '16px',
                                    letterSpacing: '-3px'
                                }}>
                                    <AnimatedCounter target={stat.num} suffix={stat.suffix} isVisible={inView} />
                                </div>
                                <p style={{
                                    fontSize: '14px',
                                    color: colors.textLight,
                                    lineHeight: 1.5,
                                    fontWeight: 400
                                }}>{stat.label}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        }
        
        function StickyPhilosophy({ colors, scrollY }) {
            const ref = useRef(null);
            const [progress, setProgress] = useState(0);
            
            useEffect(() => {
                const update = () => {
                    if (!ref.current) return;
                    const rect = ref.current.getBoundingClientRect();
                    const total = ref.current.offsetHeight - window.innerHeight;
                    const scrolled = -rect.top;
                    setProgress(Math.max(0, Math.min(1, scrolled / total)));
                };
                update();
                window.addEventListener('scroll', update, { passive: true });
                return () => window.removeEventListener('scroll', update);
            }, []);
            
            const statements = [
                { word: 'Compassion', desc: 'Healthcare delivered with genuine empathy and understanding.' },
                { word: 'Expertise', desc: 'Board-certified practitioners with decades of combined experience.' },
                { word: 'Prevention', desc: 'Proactive care that empowers lifelong wellness and vitality.' },
                { word: 'Community', desc: 'A diverse, inclusive practice where every patient feels at home.' }
            ];
            
            const activeIdx = Math.min(statements.length - 1, Math.floor(progress * statements.length));
            
            return (
                <section id="philosophy" ref={ref} style={{
                    height: `${statements.length * 100}vh`,
                    background: colors.dark,
                    position: 'relative'
                }}>
                    <div style={{
                        position: 'sticky',
                        top: 0,
                        height: '100vh',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        overflow: 'hidden'
                    }}>
                        <div style={{
                            position: 'absolute',
                            top: '48px',
                            left: '48px',
                            fontSize: '12px',
                            letterSpacing: '3px',
                            textTransform: 'uppercase',
                            color: '#FFF',
                            opacity: 0.5,
                            fontWeight: 600
                        }}>
                            Our Philosophy — {String(activeIdx + 1).padStart(2, '0')} / {String(statements.length).padStart(2, '0')}
                        </div>
                        
                        <div style={{
                            position: 'absolute',
                            top: '48px',
                            right: '48px',
                            display: 'flex',
